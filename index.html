<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ CRYSTAL COLLECTOR | Облачное сохранение</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e, #060914);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      padding: 16px 16px 100px 16px;
      max-width: 100%;
    }

    .glass-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(139,92,246,0.3);
    }

    .balance-card {
      background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(76,29,149,0.3));
      text-align: center;
    }

    .balance-value {
      font-size: 56px;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .crystal {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle at 30% 30%, #8b5cf6, #4c1d95);
      border-radius: 60px 60px 60px 30px;
      transform: rotate(10deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 90px;
      margin: 20px auto;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 0 40px rgba(139,92,246,0.6);
    }

    .crystal:active {
      transform: scale(0.94) rotate(8deg);
    }

    /* Горизонтальное меню */
    .scrollable-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,15,30,0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(139,92,246,0.5);
      padding: 12px 0 20px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .nav-items {
      display: inline-flex;
      gap: 8px;
      padding: 0 16px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #aaa;
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      min-width: 70px;
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
    }

    .panel {
      display: none;
      animation: fadeIn 0.3s;
    }

    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .collectible-card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 16px;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.3);
    }

    .collectible-card.owned {
      border-color: #ffd700;
      background: rgba(255,215,0,0.15);
    }

    .collectible-icon {
      font-size: 48px;
    }

    .btn {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .market-item {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .float-coin {
      position: fixed;
      pointer-events: none;
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 1000;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.5); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.3); }
    }

    select, input {
      background: #1a1a2e;
      color: white;
      border: 1px solid #8b5cf6;
      border-radius: 20px;
      padding: 12px;
      margin: 8px 0;
      width: 100%;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div id="loading" class="loading">⏳ Загрузка данных с сервера...</div>

  <div id="gameContent" style="display: none;">
    <!-- Панель Главная -->
    <div id="mainPanel" class="panel active">
      <div class="glass-card balance-card">
        <div>💎 КРИСТАЛЛЫ</div>
        <div class="balance-value" id="balance">0</div>
      </div>
      <div class="crystal" id="crystal">💎</div>
      <div class="glass-card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span>⚡ Сила клика</span><span id="tapPower">1</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span>🤖 Автокликеры</span><span id="autoCount">0</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
          <span>📦 Коллекция</span><span id="collectionCount">0</span>
        </div>
      </div>
    </div>

    <!-- Панель Коллекция -->
    <div id="collectionPanel" class="panel">
      <div class="glass-card">
        <h3>✨ КОЛЛЕКЦИЯ</h3>
        <p>Редкие предметы, которые ничего не дают</p>
      </div>
      <div class="items-grid" id="collectiblesGrid"></div>
    </div>

    <!-- Панель Улучшения -->
    <div id="upgradesPanel" class="panel">
      <div class="glass-card">
        <div class="market-item">
          <div><strong>💪 Сила кристалла</strong><br>Уровень <span id="tapLevelInfo">1</span></div>
          <button class="btn" style="width: auto; padding: 8px 16px;" id="upgradeTapBtn">🔧 <span id="tapCost">100</span>💰</button>
        </div>
        <div class="market-item">
          <div><strong>🤖 Автодобытчик</strong><br>+15 монет/мин</div>
          <button class="btn" style="width: auto; padding: 8px 16px;" id="buyAutoBtn">🤖 <span id="autoCost">500</span>💰</button>
        </div>
        <div class="market-item">
          <div><strong>⚡ Кристаллический крит</strong><br>Шанс x3: <span id="critChance">5</span>%</div>
          <button class="btn" style="width: auto; padding: 8px 16px;" id="upgradeCritBtn">✨ <span id="critCost">1000</span>💰</button>
        </div>
      </div>
    </div>

    <!-- Панель Рынок -->
    <div id="marketPanel" class="panel">
      <div class="glass-card">
        <h3>🛒 РЫНОК</h3>
      </div>
      <div id="marketList"></div>
      <div class="glass-card">
        <h4>📤 ВЫСТАВИТЬ НА ПРОДАЖУ</h4>
        <select id="sellItemSelect"></select>
        <input type="number" id="sellPrice" placeholder="Цена">
        <button class="btn" id="sellBtn">📢 ВЫСТАВИТЬ</button>
      </div>
    </div>

    <!-- Панель Топ -->
    <div id="topPanel" class="panel">
      <div class="glass-card">
        <h3>🏆 ТОП ИГРОКОВ</h3>
        <div id="topList"></div>
      </div>
    </div>
  </div>
</div>

<div class="scrollable-nav">
  <div class="nav-items">
    <button class="nav-btn active" data-panel="main">💎<span>Главная</span></button>
    <button class="nav-btn" data-panel="collection">📦<span>Коллекция</span></button>
    <button class="nav-btn" data-panel="upgrades">📈<span>Улучшения</span></button>
    <button class="nav-btn" data-panel="market">🛒<span>Рынок</span></button>
    <button class="nav-btn" data-panel="top">🏆<span>Топ</span></button>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  let game = {
    balance: 0,
    tapPower: 1,
    autoClickers: 0,
    critChance: 5,
    totalClicks: 0,
    collectedItems: []
  };

  const collectibles = [
    { id: "stone_1", name: "Обычный Камень", icon: "🪨", desc: "Просто камень", basePrice: 100 },
    { id: "stick_1", name: "Ветка Дерева", icon: "🌿", desc: "Сломалась с куста", basePrice: 150 },
    { id: "feather_1", name: "Перо Голубя", icon: "🕊️", desc: "Кто-то потерял", basePrice: 200 },
    { id: "bottle_1", name: "Стеклянная Бутылка", icon: "🍾", desc: "Пустая", basePrice: 500 },
    { id: "key_1", name: "Ржавый Ключ", icon: "🔑", desc: "Ничего не открывает", basePrice: 800 },
    { id: "coin_old", name: "Старая Монета", icon: "🪙", desc: "Блестит", basePrice: 2000 },
    { id: "crystal_shard", name: "Осколок Кристалла", icon: "💎", desc: "Бесполезный", basePrice: 5000 },
    { id: "golden_nugget", name: "Золотой Самородок", icon: "🥇", desc: "Фальшивый", basePrice: 15000 },
    { id: "dragon_scale", name: "Чешуя Дракона", icon: "🐉", desc: "Легендарная", basePrice: 50000 },
    { id: "moon_dust", name: "Лунная Пыль", icon: "🌙", desc: "Светится", basePrice: 100000 }
  ];

  // Отправка данных в бот
  async function sendToBot(action, extra = {}) {
    const data = { action, ...extra };
    tg.sendData(JSON.stringify(data));
    return new Promise((resolve) => {
      tg.onEvent('mainButtonClicked', () => {});
      setTimeout(() => resolve(null), 500);
    });
  }

  // Загрузка данных с сервера
  async function loadFromCloud() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("gameContent").style.display = "none";
    
    const response = await sendToBot("load");
    // В реальности данные придут через ответ, пока эмуляция
    // Для демо используем localStorage как fallback, но в боте будет работать
    const saved = localStorage.getItem("crystal_backup");
    if (saved) {
      const data = JSON.parse(saved);
      game = { ...game, ...data };
    }
    
    document.getElementById("loading").style.display = "none";
    document.getElementById("gameContent").style.display = "block";
    updateUI();
  }

  // Сохранение на сервер
  async function saveToCloud() {
    await sendToBot("save", { gameData: game });
    localStorage.setItem("crystal_backup", JSON.stringify(game));
  }

  function updateUI() {
    document.getElementById("balance").innerText = Math.floor(game.balance);
    document.getElementById("tapPower").innerText = game.tapPower;
    document.getElementById("autoCount").innerText = game.autoClickers;
    document.getElementById("collectionCount").innerText = game.collectedItems.length;
    document.getElementById("tapLevelInfo").innerHTML = `Уровень ${game.tapPower}`;
    document.getElementById("tapCost").innerHTML = 100 * game.tapPower;
    document.getElementById("autoCost").innerHTML = 500 * (game.autoClickers + 1);
    document.getElementById("critChance").innerHTML = game.critChance;
    document.getElementById("critCost").innerHTML = 1000 * (game.critChance / 5);
    
    renderCollectibles();
    renderMarket();
    renderTop();
    saveToCloud();
  }

  function addCoins(amount, event) {
    game.balance += amount;
    updateUI();
    const x = event?.clientX || window.innerWidth / 2;
    const y = event?.clientY || window.innerHeight / 2;
    const div = document.createElement("div");
    div.className = "float-coin";
    div.innerText = `+${Math.floor(amount)}`;
    div.style.left = x + "px";
    div.style.top = y + "px";
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 700);
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
  }

  function tapCrystal(e) {
    let gain = game.tapPower;
    if (Math.random() * 100 < game.critChance) gain *= 3;
    game.totalClicks++;
    addCoins(gain, e);
  }

  function upgradeTap() {
    const cost = 100 * game.tapPower;
    if (game.balance >= cost) {
      game.balance -= cost;
      game.tapPower++;
      updateUI();
      tg.showAlert(`💪 Сила клика +1!`);
    } else tg.showAlert("❌ Не хватает!");
  }

  function buyAuto() {
    const cost = 500 * (game.autoClickers + 1);
    if (game.balance >= cost) {
      game.balance -= cost;
      game.autoClickers++;
      updateUI();
      tg.showAlert(`🤖 Автокликер куплен!`);
    } else tg.showAlert("❌ Не хватает!");
  }

  function upgradeCrit() {
    const cost = 1000 * (game.critChance / 5);
    if (game.balance >= cost && game.critChance < 50) {
      game.balance -= cost;
      game.critChance += 5;
      updateUI();
      tg.showAlert(`⚡ Шанс крита +5%!`);
    } else tg.showAlert("❌ Не хватает или лимит 50%!");
  }

  function openCase() {
    if (game.balance >= 5000) {
      game.balance -= 5000;
      const item = collectibles[Math.floor(Math.random() * collectibles.length)];
      if (!game.collectedItems.includes(item.id)) {
        game.collectedItems.push(item.id);
        tg.showAlert(`🎉 +${item.name}!`);
      } else {
        game.balance += 1000;
        tg.showAlert(`😕 Уже есть, +1000 монет`);
      }
      updateUI();
    } else tg.showAlert("❌ Нужно 5000 монет!");
  }

  function renderCollectibles() {
    const grid = document.getElementById("collectiblesGrid");
    grid.innerHTML = `<div class="glass-card"><button class="btn" id="openCaseBtn">🎁 КЕЙС (5000💰)</button></div>` +
      collectibles.map(item => `
        <div class="collectible-card ${game.collectedItems.includes(item.id) ? 'owned' : ''}">
          <div class="collectible-icon">${item.icon}</div>
          <div class="collectible-name">${item.name}</div>
          <div class="collectible-desc">${item.desc}</div>
        </div>
      `).join("");
    document.getElementById("openCaseBtn")?.addEventListener("click", openCase);
  }

  async function renderMarket() {
    const items = JSON.parse(localStorage.getItem("market_cloud") || "[]");
    const container = document.getElementById("marketList");
    if (items.length === 0) {
      container.innerHTML = '<div class="glass-card">📭 Рынок пуст</div>';
    } else {
      container.innerHTML = items.map((item, idx) => `
        <div class="market-item">
          <div>${item.icon} ${item.name}<br><small>${item.seller}</small></div>
          <div>💰 ${item.price}<br><button class="btn" style="padding:4px 12px" onclick="buyItem(${idx})">Купить</button></div>
        </div>
      `).join("");
    }
    
    const sellSelect = document.getElementById("sellItemSelect");
    const available = game.collectedItems.filter(id => !items.some(m => m.itemId === id));
    sellSelect.innerHTML = available.length === 0 ? '<option>Нет предметов</option>' :
      available.map(id => {
        const item = collectibles.find(c => c.id === id);
        return `<option value="${id}">${item?.icon} ${item?.name}</option>`;
      }).join("");
  }

  function sellItem() {
    const itemId = document.getElementById("sellItemSelect").value;
    const price = parseInt(document.getElementById("sellPrice").value);
    if (!itemId || itemId === "Нет предметов" || !price || price <= 0) {
      tg.showAlert("❌ Выберите предмет и цену!");
      return;
    }
    const item = collectibles.find(c => c.id === itemId);
    if (!game.collectedItems.includes(itemId)) {
      tg.showAlert("❌ Нет предмета!");
      return;
    }
    
    game.collectedItems = game.collectedItems.filter(id => id !== itemId);
    const market = JSON.parse(localStorage.getItem("market_cloud") || "[]");
    market.push({ itemId, name: item.name, icon: item.icon, price, seller: tg.initDataUnsafe?.user?.username || "Игрок" });
    localStorage.setItem("market_cloud", JSON.stringify(market));
    updateUI();
    tg.showAlert(`✅ ${item.name} выставлен за ${price}💰`);
    document.getElementById("sellPrice").value = "";
  }

  function buyItem(index) {
    const market = JSON.parse(localStorage.getItem("market_cloud") || "[]");
    const item = market[index];
    if (game.balance >= item.price) {
      game.balance -= item.price;
      game.collectedItems.push(item.itemId);
      market.splice(index, 1);
      localStorage.setItem("market_cloud", JSON.stringify(market));
      updateUI();
      tg.showAlert(`🎉 Куплен ${item.name}!`);
    } else tg.showAlert("❌ Не хватает монет!");
  }

  function renderTop() {
    const top = JSON.parse(localStorage.getItem("top_cloud") || "[]");
    const current = { name: tg.initDataUnsafe?.user?.username || "Игрок", balance: game.balance, collection: game.collectedItems.length };
    let players = [...top];
    const idx = players.findIndex(p => p.name === current.name);
    if (idx >= 0) players[idx] = current;
    else players.push(current);
    players.sort((a,b) => b.collection - a.collection);
    localStorage.setItem("top_cloud", JSON.stringify(players.slice(0,20)));
    
    document.getElementById("topList").innerHTML = players.slice(0,10).map((p,i) => `
      <div class="market-item">
        <span>${i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}. ${p.name}</span>
        <span>📦 ${p.collection}</span>
        <span>💰 ${Math.floor(p.balance).toLocaleString()}</span>
      </div>
    `).join("");
  }

  // Автокликер
  setInterval(() => {
    if (game.autoClickers > 0) {
      game.balance += game.autoClickers * 15;
      updateUI();
    }
  }, 60000);

  // Навигация
  function switchPanel(panelId) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(`${panelId}Panel`).classList.add("active");
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(`.nav-btn[data-panel="${panelId}"]`).classList.add("active");
  }

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => switchPanel(btn.dataset.panel));
  });

  document.getElementById("crystal").addEventListener("click", tapCrystal);
  document.getElementById("upgradeTapBtn").addEventListener("click", upgradeTap);
  document.getElementById("buyAutoBtn").addEventListener("click", buyAuto);
  document.getElementById("upgradeCritBtn").addEventListener("click", upgradeCrit);
  document.getElementById("sellBtn").addEventListener("click", sellItem);

  loadFromCloud();
</script>
</body>
</html>
