<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💎 CRYSTAL ECONOMY</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e, #060914);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      min-height: 100vh;
    }

    /* Вкладки */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.5);
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      border-radius: 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    .tab.active {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      font-weight: bold;
    }

    /* Основной экран */
    .panel {
      display: none;
      padding: 20px;
      animation: fadeIn 0.3s;
    }
    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Кристалл */
    .crystal {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle at 30% 30%, #8b5cf6, #4c1d95);
      border-radius: 60px 60px 60px 30px;
      transform: rotate(10deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      margin: 20px auto;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 0 30px #8b5cf6;
    }
    .crystal:active {
      transform: scale(0.94) rotate(8deg);
    }

    /* Баланс */
    .balance-card {
      text-align: center;
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(76,29,149,0.2));
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .balance {
      font-size: 48px;
      font-weight: bold;
      color: #ffd700;
    }

    /* Предметы */
    .item-grid {
      display: grid;
      gap: 12px;
    }
    .item-card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #ffd700;
    }
    .item-info h3 {
      font-size: 18px;
    }
    .item-info p {
      font-size: 12px;
      opacity: 0.7;
    }
    .buy-btn {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Топ игроков */
    .top-player {
      background: rgba(0,0,0,0.5);
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
    }

    .float-coin {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      font-weight: bold;
      color: gold;
      animation: floatUp 0.6s ease-out forwards;
      z-index: 1000;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.5);}
      100% { opacity: 0; transform: translateY(-100px) scale(1.2);}
    }
  </style>
</head>
<body>

<div class="tabs">
  <button class="tab active" data-tab="main">💎 ГЛАВНАЯ</button>
  <button class="tab" data-tab="upgrades">📈 УЛУЧШЕНИЯ</button>
  <button class="tab" data-tab="items">✨ УНИКАЛЬНЫЕ</button>
  <button class="tab" data-tab="market">🛒 РЫНОК</button>
  <button class="tab" data-tab="top">🏆 ТОП</button>
</div>

<!-- Панель Главная -->
<div id="main" class="panel active">
  <div class="balance-card">
    <div style="font-size:14px; opacity:0.8;">💎 КРИСТАЛЛЫ</div>
    <div class="balance" id="balance">0</div>
  </div>
  <div class="crystal" id="crystal">
    💎
  </div>
  <div style="text-align:center; font-size:12px;">👇 тапай по кристаллу</div>
</div>

<!-- Панель Улучшения -->
<div id="upgrades" class="panel">
  <div class="item-grid">
    <div class="item-card"><div><h3>💪 Сила кристалла</h3><p>Уровень: <span id="tapLv">1</span></p></div><button class="buy-btn" id="upgradeTap">🔼 <span id="tapCost">100</span>💰</button></div>
    <div class="item-card"><div><h3>🤖 Автодобытчик</h3><p>Куплено: <span id="autoCount">0</span> | +15/мин</p></div><button class="buy-btn" id="buyAuto">🛒 <span id="autoCost">500</span>💰</button></div>
    <div class="item-card"><div><h3>⚡ Кристаллический крит</h3><p>Шанс: <span id="critChance">5</span>% | x<span id="critMult">3</span></p></div><button class="buy-btn" id="upgradeCrit">✨ <span id="critCost">1000</span>💰</button></div>
    <div class="item-card"><div><h3>🔮 Престиж</h3><p>Сбросить прогресс за x2 доход</p></div><button class="buy-btn" id="prestigeBtn">🌟 100000💰</button></div>
  </div>
</div>

<!-- Панель Уникальные предметы -->
<div id="items" class="panel">
  <div class="item-grid" id="uniqueItemsList"></div>
</div>

<!-- Панель Рынок -->
<div id="market" class="panel">
  <div id="marketList" class="item-grid"></div>
  <div style="margin-top: 20px;">
    <h3>📤 Выставить на рынок</h3>
    <select id="sellItemSelect"></select>
    <input type="number" id="sellPrice" placeholder="Цена">
    <button class="buy-btn" id="sellBtn">Продать</button>
  </div>
</div>

<!-- Панель Топ -->
<div id="top" class="panel">
  <div id="topList"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();

  // Игровые данные
  let game = {
    balance: 5000,
    tapPower: 1,
    autoClickers: 0,
    critChance: 5,
    critMult: 3,
    prestige: 0,
    totalClicks: 0,
    uniqueItems: []
  };

  // Уникальные предметы (стоимость в миллионах)
  const uniqueShop = [
    { id: "dragon_eye", name: "🐉 Глаз Дракона", price: 500000, desc: "x2 к силе клика", power: 2, type: "multiplier" },
    { id: "phoenix_feather", name: "🔥 Перо Феникса", price: 1000000, desc: "+50% шанс крита", critBonus: 25, type: "crit" },
    { id: "time_crystal", name: "⏳ Кристалл Времени", price: 2500000, desc: "Автокликеры работают x2", autoMult: 2, type: "auto" },
    { id: "golden_apple", name: "🍎 Золотое Яблоко", price: 7500000, desc: "Все бонусы +100%", allBonus: 2, type: "legendary" },
    { id: "void_core", name: "🌌 Ядро Бездны", price: 15000000, desc: "x10 ко всем доходам", godMode: 10, type: "godly" }
  ];

  function save() {
    localStorage.setItem("crystal_economy", JSON.stringify(game));
  }

  function load() {
    const saved = localStorage.getItem("crystal_economy");
    if (saved) {
      const data = JSON.parse(saved);
      game = { ...game, ...data };
    }
    updateUI();
  }

  function updateUI() {
    document.getElementById("balance").innerText = Math.floor(game.balance);
    document.getElementById("tapLv").innerText = game.tapPower;
    document.getElementById("autoCount").innerText = game.autoClickers;
    document.getElementById("critChance").innerText = game.critChance;
    document.getElementById("critMult").innerText = game.critMult;
    
    document.getElementById("tapCost").innerText = 100 * game.tapPower;
    document.getElementById("autoCost").innerText = 500 * (game.autoClickers + 1);
    document.getElementById("critCost").innerText = 1000 * (game.critChance / 5);
    
    renderUniqueItems();
    renderMarket();
    renderTop();
    save();
  }

  function addCoins(amount, event) {
    game.balance += amount;
    updateUI();
    const x = event?.clientX || window.innerWidth/2;
    const y = event?.clientY || window.innerHeight/2;
    const div = document.createElement("div");
    div.className = "float-coin";
    div.innerText = `+${Math.floor(amount)}`;
    div.style.left = x + "px";
    div.style.top = y + "px";
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 600);
  }

  function tapCrystal(e) {
    let gain = game.tapPower;
    let isCrit = Math.random() * 100 < game.critChance;
    if (isCrit) gain *= game.critMult;
    game.totalClicks++;
    addCoins(gain, e);
  }

  function upgradeTap() {
    let cost = 100 * game.tapPower;
    if (game.balance >= cost) {
      game.balance -= cost;
      game.tapPower++;
      updateUI();
    }
  }

  function buyAuto() {
    let cost = 500 * (game.autoClickers + 1);
    if (game.balance >= cost) {
      game.balance -= cost;
      game.autoClickers++;
      updateUI();
    }
  }

  function upgradeCrit() {
    let cost = 1000 * (game.critChance / 5);
    if (game.balance >= cost && game.critChance < 75) {
      game.balance -= cost;
      game.critChance += 5;
      updateUI();
    }
  }

  function buyUniqueItem(item) {
    if (game.balance >= item.price && !game.uniqueItems.includes(item.id)) {
      game.balance -= item.price;
      game.uniqueItems.push(item.id);
      if (item.type === "multiplier") game.tapPower *= item.power;
      if (item.type === "crit") game.critChance += item.critBonus;
      updateUI();
      tg.showAlert(`🎉 Куплено ${item.name}!`);
    } else {
      tg.showAlert("❌ Не хватает монет или уже есть");
    }
  }

  function renderUniqueItems() {
    const container = document.getElementById("uniqueItemsList");
    container.innerHTML = uniqueShop.map(item => `
      <div class="item-card">
        <div><h3>${item.name}</h3><p>${item.desc}</p><p style="color:#ffd700">💰 ${item.price.toLocaleString()} монет</p></div>
        <button class="buy-btn" onclick='buyUniqueItem(${JSON.stringify(item)})'>Купить</button>
      </div>
    `).join("");
  }

  function renderMarket() {
    const container = document.getElementById("marketList");
    const marketItems = JSON.parse(localStorage.getItem("marketItems") || "[]");
    if (marketItems.length === 0) {
      container.innerHTML = "<div>Рынок пуст</div>";
      return;
    }
    container.innerHTML = marketItems.map((item, idx) => `
      <div class="item-card">
        <div><h3>${item.name}</h3><p>Продавец: ${item.seller}</p><p>💰 ${item.price} монет</p></div>
        <button class="buy-btn" onclick="buyFromMarket(${idx})">Купить</button>
      </div>
    `).join("");
    
    const sellSelect = document.getElementById("sellItemSelect");
    sellSelect.innerHTML = game.uniqueItems.map(id => {
      const item = uniqueShop.find(i => i.id === id);
      return `<option value="${id}">${item?.name}</option>`;
    }).join("");
  }

  function sellItem() {
    const itemId = document.getElementById("sellItemSelect").value;
    const price = parseInt(document.getElementById("sellPrice").value);
    const item = uniqueShop.find(i => i.id === itemId);
    if (!item || price <= 0) return;
    if (!game.uniqueItems.includes(itemId)) {
      tg.showAlert("У вас нет этого предмета");
      return;
    }
    game.uniqueItems = game.uniqueItems.filter(id => id !== itemId);
    const market = JSON.parse(localStorage.getItem("marketItems") || "[]");
    market.push({ id: itemId, name: item.name, price, seller: tg.initDataUnsafe?.user?.username || "Игрок" });
    localStorage.setItem("marketItems", JSON.stringify(market));
    updateUI();
    tg.showAlert(`✅ ${item.name} выставлен на продажу за ${price} монет`);
  }

  function buyFromMarket(index) {
    const market = JSON.parse(localStorage.getItem("marketItems") || "[]");
    const item = market[index];
    if (!item) return;
    if (game.balance >= item.price) {
      game.balance -= item.price;
      game.uniqueItems.push(item.id);
      market.splice(index, 1);
      localStorage.setItem("marketItems", JSON.stringify(market));
      updateUI();
      tg.showAlert(`🎉 Куплен ${item.name} за ${item.price} монет!`);
    } else {
      tg.showAlert("❌ Не хватает монет");
    }
  }

  function renderTop() {
    const top = JSON.parse(localStorage.getItem("topPlayers") || "[]");
    const container = document.getElementById("topList");
    if (top.length === 0) {
      container.innerHTML = "<div>Топ пуст. Играйте чтобы попасть в рейтинг!</div>";
      return;
    }
    container.innerHTML = top.slice(0, 10).map((p, i) => `
      <div class="top-player">
        <span>${i+1}. ${p.name}</span>
        <span>💰 ${p.balance.toLocaleString()}</span>
        <span>⭐ Престиж ${p.prestige}</span>
      </div>
    `).join("");
  }

  function updateTop() {
    const top = JSON.parse(localStorage.getItem("topPlayers") || "[]");
    const player = { name: tg.initDataUnsafe?.user?.username || "Игрок", balance: game.balance, prestige: game.prestige };
    top.push(player);
    top.sort((a,b) => b.balance - a.balance);
    localStorage.setItem("topPlayers", JSON.stringify(top.slice(0, 50)));
    renderTop();
  }

  // Автокликер
  setInterval(() => {
    if (game.autoClickers > 0) {
      game.balance += game.autoClickers * 15;
      updateUI();
    }
  }, 60000);

  // Табы
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const panelId = tab.dataset.tab;
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.getElementById(panelId).classList.add("active");
      if (panelId === "top") updateTop();
      if (panelId === "market") renderMarket();
    });
  });

  document.getElementById("crystal")?.addEventListener("click", tapCrystal);
  document.getElementById("upgradeTap")?.addEventListener("click", upgradeTap);
  document.getElementById("buyAuto")?.addEventListener("click", buyAuto);
  document.getElementById("upgradeCrit")?.addEventListener("click", upgradeCrit);
  document.getElementById("sellBtn")?.addEventListener("click", sellItem);
  
  load();
  updateTop();
</script>
</body>
</html>
